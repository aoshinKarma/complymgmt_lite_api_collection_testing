                      ],
                      "target": "Department",
                      "transformation": "DIRECT"
                    },
                    {
                      "source": [
                        "PaymentDate",
                        "SalaryAdvance"
                      ],
                      "target": "Date and amount of advance made",
                      "transformation": "CONCAT",
