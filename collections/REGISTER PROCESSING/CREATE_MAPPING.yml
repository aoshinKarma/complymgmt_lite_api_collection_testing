                    },
                    {
                      "source": [
                        "EMP NAME"
                      ],
                      "target": "Name of employee",
                      "transformation": "DIRECT"
                    },
                    {
                      "source": [
                        "FatherName"
                      ],
                      "target": "Father's name",
