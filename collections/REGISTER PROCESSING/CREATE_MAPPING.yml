                    },
                    {
                      "source": [
                        "PaymentDate"
                      ],
                      "target": "Date on which total amount realised",
                      "transformation": "DIRECT"
                    },
                    {
                      "source": [
                        ""
                      ],
                      "target": "Remarks",
                      "transformation": "DEFAULT"
                    }
                  ]
                }
              }
            }
          ]
        }
      }
